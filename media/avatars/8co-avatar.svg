<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="co-glow" cx="50%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#D4890C" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#D4890C" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0C0A07" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#0C0A07"/>

  <!-- Warm glow -->
  <circle cx="512" cy="420" r="400" fill="url(#co-glow)"/>

  <!-- Connection lines (drawn first, behind nodes) -->
  <g stroke="#D4890C" stroke-width="1.5" opacity="0.25">
    <!-- From center to inner ring -->
    <line x1="512" y1="420" x2="512" y2="260"/>
    <line x1="512" y1="420" x2="650" y2="340"/>
    <line x1="512" y1="420" x2="650" y2="500"/>
    <line x1="512" y1="420" x2="512" y2="580"/>
    <line x1="512" y1="420" x2="374" y2="500"/>
    <line x1="512" y1="420" x2="374" y2="340"/>

    <!-- Inner ring interconnections -->
    <line x1="512" y1="260" x2="650" y2="340"/>
    <line x1="650" y1="340" x2="650" y2="500"/>
    <line x1="650" y1="500" x2="512" y2="580"/>
    <line x1="512" y1="580" x2="374" y2="500"/>
    <line x1="374" y1="500" x2="374" y2="340"/>
    <line x1="374" y1="340" x2="512" y2="260"/>

    <!-- Inner to outer connections -->
    <line x1="512" y1="260" x2="512" y2="160"/>
    <line x1="512" y1="260" x2="620" y2="200"/>
    <line x1="650" y1="340" x2="770" y2="290"/>
    <line x1="650" y1="340" x2="780" y2="400"/>
    <line x1="650" y1="500" x2="780" y2="480"/>
    <line x1="650" y1="500" x2="740" y2="600"/>
    <line x1="512" y1="580" x2="580" y2="680"/>
    <line x1="512" y1="580" x2="444" y2="680"/>
    <line x1="374" y1="500" x2="284" y2="600"/>
    <line x1="374" y1="500" x2="244" y2="480"/>
    <line x1="374" y1="340" x2="244" y2="400"/>
    <line x1="374" y1="340" x2="254" y2="290"/>
    <line x1="512" y1="260" x2="404" y2="200"/>
  </g>

  <!-- Outer-to-outer faint connections -->
  <g stroke="#A86B08" stroke-width="0.8" opacity="0.1">
    <line x1="512" y1="160" x2="620" y2="200"/>
    <line x1="620" y1="200" x2="770" y2="290"/>
    <line x1="770" y1="290" x2="780" y2="400"/>
    <line x1="780" y1="400" x2="780" y2="480"/>
    <line x1="780" y1="480" x2="740" y2="600"/>
    <line x1="740" y1="600" x2="580" y2="680"/>
    <line x1="580" y1="680" x2="444" y2="680"/>
    <line x1="444" y1="680" x2="284" y2="600"/>
    <line x1="284" y1="600" x2="244" y2="480"/>
    <line x1="244" y1="480" x2="244" y2="400"/>
    <line x1="244" y1="400" x2="254" y2="290"/>
    <line x1="254" y1="290" x2="404" y2="200"/>
    <line x1="404" y1="200" x2="512" y2="160"/>
  </g>

  <!-- Outer ring nodes -->
  <g>
    <circle cx="512" cy="160" r="8" fill="none" stroke="#A86B08" stroke-width="2" opacity="0.4"/>
    <circle cx="512" cy="160" r="3" fill="#D4890C" opacity="0.5"/>

    <circle cx="620" cy="200" r="8" fill="none" stroke="#A86B08" stroke-width="2" opacity="0.4"/>
    <circle cx="620" cy="200" r="3" fill="#D4890C" opacity="0.5"/>

    <circle cx="770" cy="290" r="8" fill="none" stroke="#A86B08" stroke-width="2" opacity="0.4"/>
    <circle cx="770" cy="290" r="3" fill="#D4890C" opacity="0.5"/>

    <circle cx="780" cy="400" r="8" fill="none" stroke="#A86B08" stroke-width="2" opacity="0.4"/>
    <circle cx="780" cy="400" r="3" fill="#D4890C" opacity="0.5"/>

    <circle cx="780" cy="480" r="8" fill="none" stroke="#A86B08" stroke-width="2" opacity="0.4"/>
    <circle cx="780" cy="480" r="3" fill="#D4890C" opacity="0.5"/>

    <circle cx="740" cy="600" r="8" fill="none" stroke="#A86B08" stroke-width="2" opacity="0.4"/>
    <circle cx="740" cy="600" r="3" fill="#D4890C" opacity="0.5"/>

    <circle cx="580" cy="680" r="8" fill="none" stroke="#A86B08" stroke-width="2" opacity="0.4"/>
    <circle cx="580" cy="680" r="3" fill="#D4890C" opacity="0.5"/>

    <circle cx="444" cy="680" r="8" fill="none" stroke="#A86B08" stroke-width="2" opacity="0.4"/>
    <circle cx="444" cy="680" r="3" fill="#D4890C" opacity="0.5"/>

    <circle cx="284" cy="600" r="8" fill="none" stroke="#A86B08" stroke-width="2" opacity="0.4"/>
    <circle cx="284" cy="600" r="3" fill="#D4890C" opacity="0.5"/>

    <circle cx="244" cy="480" r="8" fill="none" stroke="#A86B08" stroke-width="2" opacity="0.4"/>
    <circle cx="244" cy="480" r="3" fill="#D4890C" opacity="0.5"/>

    <circle cx="244" cy="400" r="8" fill="none" stroke="#A86B08" stroke-width="2" opacity="0.4"/>
    <circle cx="244" cy="400" r="3" fill="#D4890C" opacity="0.5"/>

    <circle cx="254" cy="290" r="8" fill="none" stroke="#A86B08" stroke-width="2" opacity="0.4"/>
    <circle cx="254" cy="290" r="3" fill="#D4890C" opacity="0.5"/>

    <circle cx="404" cy="200" r="8" fill="none" stroke="#A86B08" stroke-width="2" opacity="0.4"/>
    <circle cx="404" cy="200" r="3" fill="#D4890C" opacity="0.5"/>
  </g>

  <!-- Inner ring nodes -->
  <g>
    <circle cx="512" cy="260" r="14" fill="none" stroke="#D4890C" stroke-width="2.5" opacity="0.6"/>
    <circle cx="512" cy="260" r="5" fill="#E8A832" opacity="0.7"/>

    <circle cx="650" cy="340" r="14" fill="none" stroke="#D4890C" stroke-width="2.5" opacity="0.6"/>
    <circle cx="650" cy="340" r="5" fill="#E8A832" opacity="0.7"/>

    <circle cx="650" cy="500" r="14" fill="none" stroke="#D4890C" stroke-width="2.5" opacity="0.6"/>
    <circle cx="650" cy="500" r="5" fill="#E8A832" opacity="0.7"/>

    <circle cx="512" cy="580" r="14" fill="none" stroke="#D4890C" stroke-width="2.5" opacity="0.6"/>
    <circle cx="512" cy="580" r="5" fill="#E8A832" opacity="0.7"/>

    <circle cx="374" cy="500" r="14" fill="none" stroke="#D4890C" stroke-width="2.5" opacity="0.6"/>
    <circle cx="374" cy="500" r="5" fill="#E8A832" opacity="0.7"/>

    <circle cx="374" cy="340" r="14" fill="none" stroke="#D4890C" stroke-width="2.5" opacity="0.6"/>
    <circle cx="374" cy="340" r="5" fill="#E8A832" opacity="0.7"/>
  </g>

  <!-- Center node - largest, brightest -->
  <circle cx="512" cy="420" r="24" fill="none" stroke="#E8A832" stroke-width="3"/>
  <circle cx="512" cy="420" r="16" fill="none" stroke="#D4890C" stroke-width="1.5" opacity="0.5"/>
  <circle cx="512" cy="420" r="8" fill="#E8A832" opacity="0.8"/>

  <!-- Code text: 8CO -->
  <text x="512" y="870" text-anchor="middle" font-family="'Fraunces', 'Georgia', serif" font-weight="800" font-size="96" fill="#D4890C" letter-spacing="12">8CO</text>

  <!-- Subtitle -->
  <text x="512" y="920" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="400" font-size="24" fill="#A86B08" letter-spacing="8" opacity="0.6">COMMUNITY OFFICER</text>
</svg>