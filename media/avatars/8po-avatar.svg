<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="po-glow" cx="50%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#E8A832" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#D4890C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0C0A07" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="po-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8A832" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#D4890C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#0C0A07"/>

  <!-- Warm ambient glow -->
  <circle cx="512" cy="420" r="400" fill="url(#po-glow)"/>

  <!-- Concentric circles - outermost to innermost -->
  <circle cx="512" cy="420" r="280" fill="none" stroke="#A86B08" stroke-width="0.8" opacity="0.15"/>
  <circle cx="512" cy="420" r="248" fill="none" stroke="#A86B08" stroke-width="1" opacity="0.2"/>
  <circle cx="512" cy="420" r="216" fill="none" stroke="#D4890C" stroke-width="1" opacity="0.25"/>
  <circle cx="512" cy="420" r="184" fill="none" stroke="#D4890C" stroke-width="1.2" opacity="0.3"/>
  <circle cx="512" cy="420" r="152" fill="none" stroke="#D4890C" stroke-width="1.5" opacity="0.4"/>
  <circle cx="512" cy="420" r="120" fill="none" stroke="#D4890C" stroke-width="2" opacity="0.5"/>
  <circle cx="512" cy="420" r="88" fill="none" stroke="#E8A832" stroke-width="2" opacity="0.6"/>
  <circle cx="512" cy="420" r="56" fill="none" stroke="#E8A832" stroke-width="2.5" opacity="0.7"/>

  <!-- Warm center fill -->
  <circle cx="512" cy="420" r="56" fill="url(#po-center)"/>

  <!-- Dashed orbit lines for human/approachable feel -->
  <circle cx="512" cy="420" r="310" fill="none" stroke="#A86B08" stroke-width="0.5" stroke-dasharray="8 12" opacity="0.2"/>

  <!-- User figure silhouette at center - abstract geometric person -->
  <g transform="translate(512, 420)" opacity="0.9">
    <!-- Head -->
    <circle cx="0" cy="-18" r="14" fill="none" stroke="#E8A832" stroke-width="3"/>
    <!-- Body -->
    <line x1="0" y1="-4" x2="0" y2="20" stroke="#E8A832" stroke-width="3" stroke-linecap="round"/>
    <!-- Arms -->
    <line x1="-16" y1="6" x2="16" y2="6" stroke="#E8A832" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Orbital dots on rings (stakeholders, users, touchpoints) -->
  <g fill="#D4890C">
    <!-- Ring 3 -->
    <circle cx="696" cy="420" r="4" opacity="0.5"/>
    <circle cx="328" cy="420" r="4" opacity="0.5"/>
    <!-- Ring 4 -->
    <circle cx="512" cy="236" r="4" opacity="0.45"/>
    <circle cx="512" cy="604" r="4" opacity="0.45"/>
    <!-- Ring 5 -->
    <circle cx="620" cy="312" r="3.5" opacity="0.4"/>
    <circle cx="404" cy="528" r="3.5" opacity="0.4"/>
    <!-- Ring 6 -->
    <circle cx="404" cy="312" r="3" opacity="0.35"/>
    <circle cx="620" cy="528" r="3" opacity="0.35"/>
  </g>

  <!-- Connecting lines from dots to center (user-centered design) -->
  <g stroke="#D4890C" stroke-width="0.5" opacity="0.15">
    <line x1="696" y1="420" x2="512" y2="420"/>
    <line x1="328" y1="420" x2="512" y2="420"/>
    <line x1="512" y1="236" x2="512" y2="420"/>
    <line x1="512" y1="604" x2="512" y2="420"/>
    <line x1="620" y1="312" x2="512" y2="420"/>
    <line x1="404" y1="528" x2="512" y2="420"/>
    <line x1="404" y1="312" x2="512" y2="420"/>
    <line x1="620" y1="528" x2="512" y2="420"/>
  </g>

  <!-- Bright accent dots -->
  <g fill="#E8A832">
    <circle cx="696" cy="420" r="2.5" opacity="0.7"/>
    <circle cx="328" cy="420" r="2.5" opacity="0.7"/>
    <circle cx="512" cy="236" r="2.5" opacity="0.7"/>
    <circle cx="512" cy="604" r="2.5" opacity="0.7"/>
  </g>

  <!-- Code text: 8PO -->
  <text x="512" y="870" text-anchor="middle" font-family="'Fraunces', 'Georgia', serif" font-weight="800" font-size="96" fill="#D4890C" letter-spacing="12">8PO</text>

  <!-- Subtitle -->
  <text x="512" y="920" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="400" font-size="24" fill="#A86B08" letter-spacing="8" opacity="0.6">PRODUCT OFFICER</text>
</svg>