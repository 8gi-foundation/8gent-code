<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="eo-glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#D4890C" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#D4890C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0C0A07" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eo-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8A832"/>
      <stop offset="100%" stop-color="#D4890C"/>
    </radialGradient>
    <linearGradient id="eo-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8A832"/>
      <stop offset="50%" stop-color="#D4890C"/>
      <stop offset="100%" stop-color="#A86B08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#0C0A07"/>

  <!-- Ambient glow -->
  <circle cx="512" cy="420" r="380" fill="url(#eo-glow)"/>

  <!-- Radiating lines from center -->
  <g stroke="#D4890C" stroke-width="1.5" opacity="0.25">
    <line x1="512" y1="420" x2="512" y2="80"/>
    <line x1="512" y1="420" x2="752" y2="180"/>
    <line x1="512" y1="420" x2="872" y2="340"/>
    <line x1="512" y1="420" x2="872" y2="500"/>
    <line x1="512" y1="420" x2="752" y2="660"/>
    <line x1="512" y1="420" x2="512" y2="760"/>
    <line x1="512" y1="420" x2="272" y2="660"/>
    <line x1="512" y1="420" x2="152" y2="500"/>
    <line x1="512" y1="420" x2="152" y2="340"/>
    <line x1="512" y1="420" x2="272" y2="180"/>
  </g>

  <!-- Secondary radiating lines -->
  <g stroke="#A86B08" stroke-width="1" opacity="0.15">
    <line x1="512" y1="420" x2="632" y2="130"/>
    <line x1="512" y1="420" x2="832" y2="240"/>
    <line x1="512" y1="420" x2="892" y2="420"/>
    <line x1="512" y1="420" x2="832" y2="600"/>
    <line x1="512" y1="420" x2="632" y2="710"/>
    <line x1="512" y1="420" x2="392" y2="710"/>
    <line x1="512" y1="420" x2="192" y2="600"/>
    <line x1="512" y1="420" x2="132" y2="420"/>
    <line x1="512" y1="420" x2="192" y2="240"/>
    <line x1="512" y1="420" x2="392" y2="130"/>
  </g>

  <!-- Outer ring -->
  <circle cx="512" cy="420" r="240" fill="none" stroke="#A86B08" stroke-width="1" opacity="0.3"/>
  <circle cx="512" cy="420" r="280" fill="none" stroke="#A86B08" stroke-width="0.5" opacity="0.15"/>

  <!-- Infinity symbol (rotated 8) -->
  <g transform="translate(512, 420)" fill="none" stroke="url(#eo-stroke)" stroke-width="8" stroke-linecap="round">
    <!-- Left loop -->
    <ellipse cx="-80" cy="0" rx="80" ry="60"/>
    <!-- Right loop -->
    <ellipse cx="80" cy="0" rx="80" ry="60"/>
  </g>

  <!-- Inner glow on infinity -->
  <g transform="translate(512, 420)" fill="none" stroke="#E8A832" stroke-width="3" stroke-linecap="round" opacity="0.5">
    <ellipse cx="-80" cy="0" rx="80" ry="60"/>
    <ellipse cx="80" cy="0" rx="80" ry="60"/>
  </g>

  <!-- Center dot -->
  <circle cx="512" cy="420" r="6" fill="#E8A832"/>

  <!-- Decorative dots at line endpoints -->
  <g fill="#D4890C" opacity="0.4">
    <circle cx="512" cy="80" r="3"/>
    <circle cx="752" cy="180" r="3"/>
    <circle cx="872" cy="340" r="3"/>
    <circle cx="872" cy="500" r="3"/>
    <circle cx="752" cy="660" r="3"/>
    <circle cx="272" cy="660" r="3"/>
    <circle cx="152" cy="500" r="3"/>
    <circle cx="152" cy="340" r="3"/>
    <circle cx="272" cy="180" r="3"/>
  </g>

  <!-- Code text: 8EO -->
  <text x="512" y="870" text-anchor="middle" font-family="'Fraunces', 'Georgia', serif" font-weight="800" font-size="96" fill="#D4890C" letter-spacing="12">8EO</text>

  <!-- Subtle subtitle -->
  <text x="512" y="920" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="400" font-size="24" fill="#A86B08" letter-spacing="8" opacity="0.6">EXECUTIVE OFFICER</text>
</svg>