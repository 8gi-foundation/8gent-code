<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="do-glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#E8A832" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0C0A07" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="do-spiral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8A832"/>
      <stop offset="50%" stop-color="#D4890C"/>
      <stop offset="100%" stop-color="#A86B08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#0C0A07"/>

  <!-- Ambient glow -->
  <circle cx="512" cy="400" r="360" fill="url(#do-glow)"/>

  <!-- Golden ratio rectangles - nested, rotated -->
  <g transform="translate(512, 400)" fill="none" opacity="0.12" stroke="#A86B08" stroke-width="0.8">
    <rect x="-220" y="-136" width="440" height="272" rx="2"/>
    <rect x="-220" y="-136" width="272" height="272" rx="2"/>
    <rect x="-220" y="32" width="168" height="104" rx="2"/>
    <rect x="-52" y="32" width="104" height="104" rx="2"/>
  </g>

  <!-- Golden ratio spiral - approximated with arcs -->
  <g transform="translate(512, 400)" fill="none" stroke="url(#do-spiral)" stroke-width="3" stroke-linecap="round">
    <!-- Spiral built from quarter-circle arcs -->
    <path d="
      M 52,136
      A 168,168 0 0,1 -220,136
      A 272,272 0 0,1 52,-136
      A 168,168 0 0,1 220,32
      A 104,104 0 0,1 52,136
    " opacity="0.7"/>
  </g>

  <!-- Inner spiral detail -->
  <g transform="translate(512, 400)" fill="none" stroke="#E8A832" stroke-width="2" stroke-linecap="round">
    <path d="
      M 52,136
      A 104,104 0 0,1 -52,32
      A 64,64 0 0,1 12,136
      A 40,40 0 0,1 52,96
      A 24,24 0 0,1 28,120
    " opacity="0.5"/>
  </g>

  <!-- Phi proportion markers -->
  <g transform="translate(512, 400)" fill="#E8A832" opacity="0.4">
    <circle cx="-220" cy="-136" r="3"/>
    <circle cx="220" cy="-136" r="3"/>
    <circle cx="220" cy="136" r="3"/>
    <circle cx="-220" cy="136" r="3"/>
    <circle cx="52" cy="-136" r="3"/>
    <circle cx="52" cy="136" r="3"/>
    <circle cx="-220" cy="32" r="3"/>
    <circle cx="-52" cy="32" r="3"/>
    <circle cx="52" cy="32" r="3"/>
  </g>

  <!-- Geometric construction lines -->
  <g transform="translate(512, 400)" stroke="#D4890C" stroke-width="0.5" opacity="0.1">
    <line x1="-220" y1="-136" x2="220" y2="136"/>
    <line x1="220" y1="-136" x2="-220" y2="136"/>
    <line x1="52" y1="-136" x2="52" y2="136"/>
    <line x1="-220" y1="32" x2="220" y2="32"/>
  </g>

  <!-- Outer decorative circle -->
  <circle cx="512" cy="400" r="300" fill="none" stroke="#A86B08" stroke-width="0.5" opacity="0.2"/>

  <!-- Phi symbol at spiral center -->
  <text x="536" y="422" text-anchor="middle" font-family="'Georgia', serif" font-style="italic" font-size="28" fill="#E8A832" opacity="0.5">&#966;</text>

  <!-- Fine tick marks around outer circle -->
  <g transform="translate(512, 400)" stroke="#D4890C" stroke-width="0.8" opacity="0.2">
    <line x1="0" y1="-296" x2="0" y2="-304"/>
    <line x1="148" y1="-256" x2="152" y2="-263"/>
    <line x1="256" y1="-148" x2="263" y2="-152"/>
    <line x1="296" y1="0" x2="304" y2="0"/>
    <line x1="256" y1="148" x2="263" y2="152"/>
    <line x1="148" y1="256" x2="152" y2="263"/>
    <line x1="0" y1="296" x2="0" y2="304"/>
    <line x1="-148" y1="256" x2="-152" y2="263"/>
    <line x1="-256" y1="148" x2="-263" y2="152"/>
    <line x1="-296" y1="0" x2="-304" y2="0"/>
    <line x1="-256" y1="-148" x2="-263" y2="-152"/>
    <line x1="-148" y1="-256" x2="-152" y2="-263"/>
  </g>

  <!-- Code text: 8DO -->
  <text x="512" y="870" text-anchor="middle" font-family="'Fraunces', 'Georgia', serif" font-weight="800" font-size="96" fill="#D4890C" letter-spacing="12">8DO</text>

  <!-- Subtitle -->
  <text x="512" y="920" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="400" font-size="24" fill="#A86B08" letter-spacing="8" opacity="0.6">DESIGN OFFICER</text>
</svg>