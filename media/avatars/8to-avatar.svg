<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="to-glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#D4890C" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0C0A07" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="to-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8A832"/>
      <stop offset="100%" stop-color="#A86B08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#0C0A07"/>

  <!-- Ambient glow -->
  <circle cx="512" cy="420" r="350" fill="url(#to-glow)"/>

  <!-- Circuit grid - horizontal lines -->
  <g stroke="#A86B08" stroke-width="1" opacity="0.15">
    <line x1="200" y1="260" x2="824" y2="260"/>
    <line x1="200" y1="340" x2="824" y2="340"/>
    <line x1="200" y1="420" x2="824" y2="420"/>
    <line x1="200" y1="500" x2="824" y2="500"/>
    <line x1="200" y1="580" x2="824" y2="580"/>
  </g>

  <!-- Circuit grid - vertical lines -->
  <g stroke="#A86B08" stroke-width="1" opacity="0.15">
    <line x1="280" y1="180" x2="280" y2="660"/>
    <line x1="380" y1="180" x2="380" y2="660"/>
    <line x1="480" y1="180" x2="480" y2="660"/>
    <line x1="580" y1="180" x2="580" y2="660"/>
    <line x1="680" y1="180" x2="680" y2="660"/>
  </g>

  <!-- Circuit nodes - intersections -->
  <g fill="#D4890C" opacity="0.4">
    <circle cx="280" cy="260" r="4"/>
    <circle cx="480" cy="260" r="4"/>
    <circle cx="680" cy="260" r="4"/>
    <circle cx="380" cy="340" r="4"/>
    <circle cx="580" cy="340" r="4"/>
    <circle cx="280" cy="420" r="4"/>
    <circle cx="680" cy="420" r="4"/>
    <circle cx="380" cy="500" r="4"/>
    <circle cx="580" cy="500" r="4"/>
    <circle cx="280" cy="580" r="4"/>
    <circle cx="480" cy="580" r="4"/>
    <circle cx="680" cy="580" r="4"/>
  </g>

  <!-- Active circuit paths -->
  <g stroke="#D4890C" stroke-width="2.5" fill="none" opacity="0.6" stroke-linecap="round">
    <!-- Path 1 -->
    <polyline points="280,260 480,260 480,340 380,340 380,500 580,500 580,340"/>
    <!-- Path 2 -->
    <polyline points="680,260 680,420 580,420 580,500"/>
    <!-- Path 3 -->
    <polyline points="280,420 280,580 480,580 480,500"/>
  </g>

  <!-- Bright active nodes -->
  <g fill="#E8A832">
    <circle cx="280" cy="260" r="6"/>
    <circle cx="580" cy="340" r="6"/>
    <circle cx="480" cy="420" r="8" opacity="0.8"/>
    <circle cx="580" cy="500" r="6"/>
    <circle cx="480" cy="580" r="6"/>
  </g>

  <!-- Hexagonal frame -->
  <polygon points="512,160 752,280 752,560 512,680 272,560 272,280" fill="none" stroke="url(#to-grad)" stroke-width="3" opacity="0.5"/>
  <polygon points="512,190 730,298 730,542 512,650 294,542 294,298" fill="none" stroke="#A86B08" stroke-width="1" opacity="0.2"/>

  <!-- Central processor symbol -->
  <rect x="452" y="360" width="120" height="120" rx="8" fill="none" stroke="#E8A832" stroke-width="3"/>
  <rect x="468" y="376" width="88" height="88" rx="4" fill="none" stroke="#D4890C" stroke-width="1.5" opacity="0.6"/>

  <!-- Processor pins -->
  <g stroke="#D4890C" stroke-width="2" opacity="0.5">
    <!-- Top pins -->
    <line x1="480" y1="340" x2="480" y2="360"/>
    <line x1="512" y1="330" x2="512" y2="360"/>
    <line x1="544" y1="340" x2="544" y2="360"/>
    <!-- Bottom pins -->
    <line x1="480" y1="480" x2="480" y2="500"/>
    <line x1="512" y1="480" x2="512" y2="510"/>
    <line x1="544" y1="480" x2="544" y2="500"/>
    <!-- Left pins -->
    <line x1="432" y1="390" x2="452" y2="390"/>
    <line x1="422" y1="420" x2="452" y2="420"/>
    <line x1="432" y1="450" x2="452" y2="450"/>
    <!-- Right pins -->
    <line x1="572" y1="390" x2="592" y2="390"/>
    <line x1="572" y1="420" x2="602" y2="420"/>
    <line x1="572" y1="450" x2="592" y2="450"/>
  </g>

  <!-- Center 8 in processor -->
  <text x="512" y="435" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="40" fill="#E8A832">8</text>

  <!-- Code text: 8TO -->
  <text x="512" y="870" text-anchor="middle" font-family="'Fraunces', 'Georgia', serif" font-weight="800" font-size="96" fill="#D4890C" letter-spacing="12">8TO</text>

  <!-- Subtitle -->
  <text x="512" y="920" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="400" font-size="24" fill="#A86B08" letter-spacing="8" opacity="0.6">TECHNOLOGY OFFICER</text>
</svg>