<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="so-glow" cx="50%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#A86B08" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0C0A07" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="so-shield" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#D4890C"/>
      <stop offset="100%" stop-color="#A86B08"/>
    </linearGradient>
    <linearGradient id="so-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A86B08"/>
      <stop offset="100%" stop-color="#6B4400"/>
    </linearGradient>
  </defs>

  <!-- Background - slightly darker feel -->
  <rect width="1024" height="1024" fill="#0C0A07"/>

  <!-- Subdued glow -->
  <circle cx="512" cy="400" r="320" fill="url(#so-glow)"/>

  <!-- Angular background pattern - security grid -->
  <g stroke="#A86B08" stroke-width="0.5" opacity="0.08">
    <!-- Diagonal hatching -->
    <line x1="200" y1="100" x2="824" y2="724"/>
    <line x1="300" y1="100" x2="824" y2="624"/>
    <line x1="400" y1="100" x2="824" y2="524"/>
    <line x1="500" y1="100" x2="824" y2="424"/>
    <line x1="200" y1="200" x2="724" y2="724"/>
    <line x1="200" y1="300" x2="624" y2="724"/>
    <line x1="200" y1="400" x2="524" y2="724"/>
    <!-- Reverse diagonal -->
    <line x1="824" y1="100" x2="200" y2="724"/>
    <line x1="724" y1="100" x2="200" y2="624"/>
    <line x1="624" y1="100" x2="200" y2="524"/>
    <line x1="524" y1="100" x2="200" y2="424"/>
    <line x1="824" y1="200" x2="300" y2="724"/>
    <line x1="824" y1="300" x2="400" y2="724"/>
    <line x1="824" y1="400" x2="500" y2="724"/>
  </g>

  <!-- Shield shape -->
  <path d="M 512 160 L 720 260 L 720 480 Q 720 620 512 720 Q 304 620 304 480 L 304 260 Z"
        fill="none" stroke="url(#so-shield)" stroke-width="4" opacity="0.7"/>

  <!-- Inner shield -->
  <path d="M 512 200 L 680 284 L 680 472 Q 680 590 512 678 Q 344 590 344 472 L 344 284 Z"
        fill="none" stroke="#A86B08" stroke-width="1.5" opacity="0.3"/>

  <!-- Shield surface fill - very subtle -->
  <path d="M 512 200 L 680 284 L 680 472 Q 680 590 512 678 Q 344 590 344 472 L 344 284 Z"
        fill="#A86B08" opacity="0.04"/>

  <!-- Keyhole -->
  <g transform="translate(512, 400)">
    <!-- Keyhole circle -->
    <circle cx="0" cy="-30" r="44" fill="none" stroke="#D4890C" stroke-width="3"/>
    <circle cx="0" cy="-30" r="44" fill="#A86B08" opacity="0.08"/>
    <!-- Inner keyhole circle -->
    <circle cx="0" cy="-30" r="20" fill="none" stroke="#E8A832" stroke-width="2" opacity="0.6"/>
    <!-- Keyhole slot -->
    <path d="M -18 -10 L 0 80 L 18 -10" fill="none" stroke="#D4890C" stroke-width="3" stroke-linejoin="round"/>
    <path d="M -18 -10 L 0 80 L 18 -10" fill="#A86B08" opacity="0.08"/>
    <!-- Lock pin -->
    <circle cx="0" cy="-30" r="6" fill="#E8A832" opacity="0.5"/>
  </g>

  <!-- Corner brackets - protective/angular feel -->
  <g stroke="#A86B08" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round">
    <!-- Top left -->
    <polyline points="180,140 180,180 220,180"/>
    <!-- Top right -->
    <polyline points="844,140 844,180 804,180"/>
    <!-- Bottom left -->
    <polyline points="180,760 180,720 220,720"/>
    <!-- Bottom right -->
    <polyline points="844,760 844,720 804,720"/>
  </g>

  <!-- Warning ticks on shield edge -->
  <g fill="#A86B08" opacity="0.3">
    <circle cx="512" cy="160" r="3"/>
    <circle cx="720" cy="260" r="3"/>
    <circle cx="304" cy="260" r="3"/>
    <circle cx="720" cy="480" r="3"/>
    <circle cx="304" cy="480" r="3"/>
  </g>

  <!-- Code text: 8SO -->
  <text x="512" y="870" text-anchor="middle" font-family="'Fraunces', 'Georgia', serif" font-weight="800" font-size="96" fill="#A86B08" letter-spacing="12">8SO</text>

  <!-- Subtitle - slightly more muted than others -->
  <text x="512" y="920" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="400" font-size="24" fill="#A86B08" letter-spacing="8" opacity="0.5">SECURITY OFFICER</text>
</svg>