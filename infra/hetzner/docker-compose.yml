# Hetzner deployment for the Eight daemon + two Telegram bridges.
# Run from /opt/8gent on the box: `docker compose up -d --build`.
#
# Token mapping (matches 8gi-governance webhook convention):
#   TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID  -> [REDACTED-BOT]   (BOT_NAME=aijames, default)
#   EIGHT_BOT_TOKEN    / EIGHT_CHAT_ID     -> @eightgentcodebot (BOT_NAME=eightgent)
# A single shared env file (/etc/8gent/bots.env) holds both pairs; each bridge
# picks its own via BOT_NAME. The bridge code does the selection.

name: eight-vessel

services:
  daemon:
    build:
      context: ../..
      dockerfile: infra/hetzner/Dockerfile
    image: eight-vessel:latest
    container_name: eight-daemon
    restart: unless-stopped
    env_file:
      - /etc/8gent/daemon.env
    ports:
      # Localhost-only by default; expose externally via Caddy if needed.
      - "127.0.0.1:18789:18789"
    volumes:
      - eight-data:/var/lib/8gent
    networks:
      - eight
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:18789/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    command: ["bun", "run", "packages/daemon/index.ts"]

  bridge-aijames:
    image: eight-vessel:latest
    container_name: eight-bridge-aijames
    restart: unless-stopped
    depends_on:
      daemon:
        condition: service_healthy
    env_file:
      - /etc/8gent/daemon.env
      - /etc/8gent/bots.env
    environment:
      BOT_NAME: aijames
      DAEMON_URL: ws://daemon:18789
      EIGHT_TG_SESSIONS: /var/lib/8gent/telegram-sessions-aijames.json
    volumes:
      - eight-data:/var/lib/8gent
    networks:
      - eight
    command: ["bun", "run", "packages/daemon/telegram-bridge.ts"]

  bridge-eightgent:
    image: eight-vessel:latest
    container_name: eight-bridge-eightgent
    restart: unless-stopped
    depends_on:
      daemon:
        condition: service_healthy
    env_file:
      - /etc/8gent/daemon.env
      - /etc/8gent/bots.env
    environment:
      BOT_NAME: eightgent
      DAEMON_URL: ws://daemon:18789
      EIGHT_TG_SESSIONS: /var/lib/8gent/telegram-sessions-eightgent.json
    volumes:
      - eight-data:/var/lib/8gent
    networks:
      - eight
    command: ["bun", "run", "packages/daemon/telegram-bridge.ts"]

volumes:
  eight-data:

networks:
  eight:
    driver: bridge
