# Grove Peer B — Lotus-Class Compute spike vessel.
# Internal-only. Registers in dev Convex (vivid-starfish-296).
# Different region than peer-a so the 3-peer demo proves cross-region discovery.

app = "grove-peer-b"
primary_region = "lhr"

[build]
  dockerfile = "infra/grove/Dockerfile.daemon"

[env]
  GROVE_ENABLED = "1"
  VESSEL_ID = "grove-peer-b"
  VESSEL_NAME = "Grove Peer B (London)"
  VESSEL_REGION = "lhr"
  VESSEL_URL = "wss://grove-peer-b.fly.dev"
  VESSEL_OWNER = "8gi-foundation"
  CONVEX_URL = "https://vivid-starfish-296.eu-west-1.convex.cloud"

[http_service]
  internal_port = 18789
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
