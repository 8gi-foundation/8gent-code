name: Evals

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/daemon/**"
      - "packages/eight/**"
      - "packages/evals/**"
      - "evals/**"
      - ".github/workflows/evals.yml"
  workflow_dispatch:
    inputs:
      update_baseline:
        description: "Write current run as the new baseline"
        type: boolean
        default: false

jobs:
  golden-set:
    name: Golden Set Regression Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Run golden set (mock executor)
        env:
          EVALS_USE_MOCK: "1"
        run: bun run evals --output evals/report.json

      - name: Run golden set (real model)
        if: ${{ env.OPENROUTER_API_KEY != '' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EVALS_MODEL: ${{ vars.EVALS_MODEL || 'qwen/qwen-2.5-72b-instruct:free' }}
        run: bun run evals --output evals/report.json

      - name: Check vs baseline
        if: ${{ github.event_name == 'pull_request' }}
        env:
          EVALS_USE_MOCK: ${{ secrets.OPENROUTER_API_KEY == '' && '1' || '' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: bun run evals --check

      - name: Update baseline (manual trigger)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_baseline }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: bun run evals --baseline

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evals-report
          path: evals/report.json
          retention-days: 30

      - name: PR comment with summary
        if: ${{ github.event_name == 'pull_request' && always() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'evals/report.json';
            if (!fs.existsSync(path)) return;
            const r = JSON.parse(fs.readFileSync(path, 'utf8'));
            const s = r.summary;
            const body = [
              '### Golden Set Eval',
              `- Executor: \`${r.executor}\``,
              `- Pass rate: **${(s.passRate * 100).toFixed(1)}%** (${s.passed}/${s.total})`,
              `- Mean score: **${s.meanScore}**`,
              `- Latency p50/p95/p99: ${s.latency.p50}ms / ${s.latency.p95}ms / ${s.latency.p99}ms`,
              '',
              'By category:',
              ...Object.entries(s.categoryBreakdown).map(([k, v]) => `- \`${k}\`: ${v.passed}/${v.total}`),
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
