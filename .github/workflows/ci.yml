name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck
        continue-on-error: true

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Test
        run: bun test
        continue-on-error: true

      - name: Build CLI
        run: bun run build

      - name: Verify build output
        run: |
          test -f dist/cli.js || (echo "Build failed: dist/cli.js not found" && exit 1)
          head -1 dist/cli.js | grep -q "#!/usr/bin/env bun" || (echo "Shebang missing" && exit 1)
          echo "Build OK: $(wc -c < dist/cli.js | tr -d ' ') bytes"

      - name: Verify version sync
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          BIN_VERSION=$(grep 'const VERSION' bin/8gent.ts | grep -o '"[^"]*"' | tr -d '"')
          if [ "$PKG_VERSION" != "$BIN_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION bin/8gent.ts=$BIN_VERSION"
            exit 1
          fi
          echo "Version sync OK: $PKG_VERSION"

      - name: Security - secrets scan
        run: |
          FINDINGS=$(grep -rn --include='*.ts' --include='*.json' \
            -E '(API_KEY|SECRET|PASSWORD|PRIVATE_KEY)\s*[:=]\s*"[^"]{8,}' \
            packages/ apps/ bin/ \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.8gent \
            2>/dev/null | grep -v 'description\|placeholder\|example\|interface\|type ' || true)
          if [ -n "$FINDINGS" ]; then
            echo "Potential hardcoded secrets found:"
            echo "$FINDINGS"
            exit 1
          fi
          echo "Secrets scan PASS"

      - name: Policy engine integrity
        run: |
          bun -e "
            import {parse} from 'yaml';
            import {readFileSync} from 'fs';
            const p = parse(readFileSync('packages/permissions/default-policies.yaml','utf-8'));
            if (!p.policies || p.policies.length < 10) {
              console.error('Policy count too low: ' + (p.policies?.length || 0));
              process.exit(1);
            }
            console.log(p.policies.length + ' policies loaded - OK');
          "
