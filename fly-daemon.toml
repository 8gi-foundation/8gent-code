# Fly.io deployment config for the Eight Vessel daemon
# App: eight-vessel | Region: Amsterdam | Port: 18789
# Deploy: fly deploy --config fly-daemon.toml

app = "eight-vessel"
primary_region = "ams"

[build]
  dockerfile = "docker/Dockerfile.daemon"

[env]
  NODE_ENV = "production"
  DEFAULT_RUNTIME = "openrouter"
  DEFAULT_MODEL = "auto:free"

[http_service]
  internal_port = 18789
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 50

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
  count = 1
