# LinkedIn Vessel - Control plane integrated, HyperAgent enabled
app = "linkedin-vessel"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  VESSEL_ID = "linkedin-vessel-ams"
  VESSEL_ACCOUNT_ID = "james-main"
  INFERENCE_MODE = "proxy"
  MODEL_PROXY_URL = "http://8gi-model-proxy.internal:3200"
  CONTROL_PLANE_URL = "wss://8gi-board-plane.fly.dev"
  PUBLIC_URL = "https://linkedin-vessel.fly.dev"
  HEALTH_PORT = "8080"
  EIGHT_DATA_DIR = "/data/.8gent"

# Secrets (set via: fly secrets set LINKEDIN_SESSION_COOKIE=... --app linkedin-vessel)
# LINKEDIN_SESSION_COOKIE
# LINKEDIN_JSESSIONID
# CRUNCHBASE_API_KEY (optional, for funding signals)

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "linkedin_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
