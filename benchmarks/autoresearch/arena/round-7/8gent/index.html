<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James Spalding | Portfolio</title>
    <style>
        :root {
            /* Design Tokens - Vercel Inspired */
            --accent: hsl(0 0% 5%);
            --primary: hsl(0 0% 5%);
            --foreground: hsl(0 0% 95%);
            --muted-foreground: hsl(0 0% 40%);
            --border: hsl(0 0% 20%);
            --button-bg: hsl(0 0% 100%);
            --button-text: hsl(0 0% 5%);

            /* Typography */
            --font-main: "Geist", "Inter", system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-    sizing: border-box;
        }

        body {
            background-color: var(--accent);
            color: var(--foreground);
            font-family: var(--font-main);
            overflow: hidden; /* Prevent scrollbars during animation */
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .overlay {
            position: relative;
            z-index: 2;
            text-align: center;
            pointer-events: none; /* Allow mouse events to pass to canvas */
            padding: 2rem;
            max-width: 800px;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 0.75rem;
            color: var(--foreground);
        }

        p {
            font-size: 1.125rem;
            color: var(--muted-foreground);
            margin-bottom: 2rem;
            font-weight: 400;
        }

        .cta-button {
            display: inline-block;
            pointer-events: auto; /* Re-enable clicks for the button */
            padding: 0.75rem 1.5rem;
            background-color: var(--button-bg);
            color: var(--button-text);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 6px;
            transition: transform 0.2s ease, opacity 0.2s ease;
            border: 1px solid var(--border);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .cta-button:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.75rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <main class="overlay">
        <h1>James Spalding</h1>
        <p>Creative Developer & Interaction Designer</p>
        <a href="#" class="cta-button">View Projects</a>
    </main>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        /**
         * Application State & Configuration
         */
        const state = {
            mouse: { x: 0, y: 0 },
            targetRotation: { x: 0, y: 0 },
            currentRotation: { x: 0, y: 0 }
        };

        let scene, camera, renderer, mesh, material;
        const container = document.getElementById('canvas-container');

        /**
         * Initialization
         */
        function init() {
            // Scene setup
            scene = new THREE.Scene();
            
            // Camera setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true // Transparent background for CSS control
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(-5, -5, 2);
            scene.add(pointLight);

            // Geometry: TorusKnot for a complex, premium look
            const geometry = new THREE.TorusKnotGeometry(1.3, 0.4, 150, 20);
            
            // Material: Metallic/Dark theme
            material = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                roughness: 0.1,
                metalness: 0.9,
            });

            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);

            animate();
        }

        /**
         * Interaction Handlers
         */
        function onMouseMove(event) {
            // Normalize mouse coordinates to -1 to +1
            state.mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            state.mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // Set target rotation based on mouse position
            state.targetRotation.y = state.mouse.x * 0.5;
            state.targetRotation.x = -state.mouse.y * 0.5;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        /**
         * Animation Loop
         */
        function animate()
            const requestID = requestAnimationFrame(animate);

            // Smooth interpolation (lerp) for rotation
            state.currentRotation.x += (state.targetRotation.x - state.currentRotation.x) * 0.05;
            state.currentRotation.y += (state.targetRotation.y - state.currentRotation.y) * 0.05;

            // Apply rotation to mesh
            mesh.rotation.x = state.currentRotation.x;
            mesh.rotation.y = state.currentRotation.y;

            // Constant slow drift/spin
            mesh.rotation.z += 0.002;

            renderer.render(scene, camera);
        }

        // Start the engine
        try {
            init();
        } catch (e) {
            console.error("Three.js initialization failed:", e);
        }

        // Cleanup on window unload
        window.addEventListener('beforeunload', () => {
            renderer.dispose();
            geometry.dispose();
            material.dispose();
        });

    </script>
</body>
</html>
